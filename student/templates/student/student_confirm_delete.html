{% extends "base.html" %}
{% block title %}Delete Student | UMS{% endblock %}
{% block content %}
<div class="confirm-card">
  <div class="confirm-icon">!</div><h1>Delete student?</h1>
  <p>You are about to delete <strong>{{ student.name }}</strong> ({{ student.reference_code }}). This cannot be undone.</p>
  <form method="post">{% csrf_token %}<button class="btn btn-danger" type="submit">Yes, Delete</button><a class="btn btn-ghost" href="{% url 'student_list' %}">Cancel</a></form>
</div>
{% endblock %}
